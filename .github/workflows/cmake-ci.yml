name: Reusable C++ CI

on:
  workflow_call:
    inputs:
      exclude_linux:
        description: 'Comma separated list of linux compilers to exclude (e.g. g++-12,clang++-17)'
        required: false
        type: string
        default: ''
      exclude_windows:
        description: 'Comma separated list of windows os_arch to exclude (e.g. windows-2022_x64)'
        required: false
        type: string
        default: ''
      exclude_macos:
        description: 'Comma separated list of macos to exclude (e.g. macos-14)'
        required: false
        type: string
        default: ''
      cxx_standard:
        description: 'C++ language standard to use (e.g. 17, 20, 23)'
        required: false
        type: string
        default: ''
      cmake_args:
        description: 'Extra arguments to pass to cmake globally'
        required: false
        type: string
        default: ''

      # example usage:
      # with:
      #   cmake_args_map: |
      #     {
      #       "ubuntu-24.04:clang++-20": "-DNOVA_NONNULL_ENABLE_CHECKS=ON",
      #       "windows-2025:x64": "-DSOME_OTHER_FLAG=1",
      #       "macos-14": "-DMAC_SPECIFIC_FLAG=ON"
      #     }
      cmake_args_map:
        description: 'JSON map of OS/compiler (or OS/arch) to extra cmake arguments. Keys like "ubuntu-24.04:clang++-20" or "windows-2025:x64"'
        required: false
        type: string
        default: '{}'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      linux_matrix: ${{ steps.gen.outputs.linux_matrix }}
      windows_matrix: ${{ steps.gen.outputs.windows_matrix }}
      macos_matrix: ${{ steps.gen.outputs.macos_matrix }}
    steps:
      - name: Generate Matrices
        id: gen
        shell: python
        run: |
          import json
          import os

          exclude_linux = "${{ inputs.exclude_linux }}".split(',')
          exclude_windows = "${{ inputs.exclude_windows }}".split(',')
          exclude_macos = "${{ inputs.exclude_macos }}".split(',')

          linux_base = [
              {"os": "ubuntu-24.04", "compiler": "g++-13", "packages": "g++-13", "build_type": "Debug"},
              {"os": "ubuntu-24.04", "compiler": "g++-14", "packages": "g++-14", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "g++-15", "packages": "g++-15", "build_type": "Debug"},
              {"os": "ubuntu-24.04", "compiler": "clang++-17", "packages": "clang-17", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-18", "packages": "clang-18", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-19", "packages": "clang-19", "build_type": "Debug"},
              {"os": "ubuntu-24.04", "compiler": "clang++-20", "packages": "clang-20", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-21", "packages": "clang-21", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-22", "packages": "clang-22", "build_type": "Release"},
              {"os": "ubuntu-22.04", "compiler": "g++-12", "packages": "g++-12", "build_type": "Debug"},
              {"os": "ubuntu-24.04-arm", "compiler": "g++-14", "packages": "g++-14", "build_type": "Debug"}
          ]

          windows_base = [
              {"os": "windows-2025", "arch": "x64", "build_type": "Release"},
              {"os": "windows-2025", "arch": "x64", "build_type": "Debug"},
              {"os": "windows-2025", "arch": "x86", "build_type": "Release"},
              {"os": "windows-2022", "arch": "x64", "build_type": "Release"},
              {"os": "windows-11-arm", "arch": "arm64", "build_type": "Release"},
          ]

          macos_base = [
              {"os": "macos-14", "build_type": "Release"},
              {"os": "macos-15", "build_type": "Release"},
              {"os": "macos-26", "build_type": "Release"},
              {"os": "macos-15-intel", "build_type": "Release"}
          ]

          try:
              args_map = json.loads('''${{ inputs.cmake_args_map }}''')
          except Exception:
              args_map = {}

          linux_matrix = [x for x in linux_base if x['compiler'] not in exclude_linux]
          for x in linux_matrix:
              x['extra_args'] = args_map.get(f"{x['os']}:{x['compiler']}", "")

          windows_matrix = [x for x in windows_base if f"{x['os']}_{x['arch']}" not in exclude_windows]
          for x in windows_matrix:
              x['extra_args'] = args_map.get(f"{x['os']}:{x['arch']}", "")

          macos_matrix = [x for x in macos_base if x['os'] not in exclude_macos]
          for x in macos_matrix:
              x['extra_args'] = args_map.get(x['os'], "")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"linux_matrix={json.dumps({'include': linux_matrix})}\n")
              f.write(f"windows_matrix={json.dumps({'include': windows_matrix})}\n")
              f.write(f"macos_matrix={json.dumps({'include': macos_matrix})}\n")

  build-linux:
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix: ${{ fromJson(needs.generate-matrix.outputs.linux_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Check if compiler is installed
        id: check_compiler
        shell: bash
        run: |
          if command -v ${{ matrix.compiler }} &> /dev/null; then
            echo "${{ matrix.compiler }} is already installed."
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "${{ matrix.compiler }} is missing."
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi
          
          if [[ "${{ matrix.compiler }}" == clang* ]]; then
            echo "is_clang=true" >> "$GITHUB_OUTPUT"
            version=$(echo "${{ matrix.compiler }}" | grep -o -E '[0-9]+')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            echo "is_clang=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install clang
        if: steps.check_compiler.outputs.installed == 'false' && steps.check_compiler.outputs.is_clang == 'true'
        uses: egor-tensin/setup-clang@v2
        with:
          version: ${{ steps.check_compiler.outputs.version }}

      - name: Install libclang-rt
        if: steps.check_compiler.outputs.installed == 'false' && steps.check_compiler.outputs.is_clang == 'true'
        shell: bash
        run: |
          sudo apt-get install -yq --no-install-recommends libclang-rt-${{ steps.check_compiler.outputs.version }}-dev llvm-${{ steps.check_compiler.outputs.version }}-dev

      - name: Install GCC
        if: steps.check_compiler.outputs.installed == 'false' && steps.check_compiler.outputs.is_clang == 'false'
        shell: bash
        run: |
          if [[ "${{ matrix.compiler }}" == "g++-15" ]]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          fi
          sudo apt-get update -yq
          sudo apt-get install -yq --no-install-recommends ${{ matrix.packages }}

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}

      - name: Configure, build, and test
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          if [ -n "${{ inputs.cmake_args }}" ]; then
            # split inputs.cmake_args on IFS into array to preserve multiple flags
            read -r -a _cmake_args <<< "${{ inputs.cmake_args }}"
            EXTRA_ARGS+=("${_cmake_args[@]}")
          fi
          if [ -n "${{ matrix.extra_args }}" ]; then
            # split matrix.extra_args on IFS into array (handles multiple flags)
            read -r -a _matrix_args <<< "${{ matrix.extra_args }}"
            EXTRA_ARGS+=("${_matrix_args[@]}")
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  build-windows:
    needs: [generate-matrix, build-linux]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix: ${{ fromJson(needs.generate-matrix.outputs.windows_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.arch }}-

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: windows-${{ matrix.arch }}-${{ matrix.build_type }}
          variant: sccache

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.arch }}

      - name: Configure, build, and test
        shell: bash
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          if [ -n "${{ inputs.cmake_args }}" ]; then
            read -r -a _cmake_args <<< "${{ inputs.cmake_args }}"
            EXTRA_ARGS+=("${_cmake_args[@]}")
          fi
          if [ -n "${{ matrix.extra_args }}" ]; then
            read -r -a _matrix_args <<< "${{ matrix.extra_args }}"
            EXTRA_ARGS+=("${_matrix_args[@]}")
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  build-macos:
    needs: [generate-matrix, build-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJson(needs.generate-matrix.outputs.macos_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ matrix.os }}-${{ matrix.build_type }}

      - name: Configure, build, and test
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          if [ -n "${{ inputs.cmake_args }}" ]; then
            read -r -a _cmake_args <<< "${{ inputs.cmake_args }}"
            EXTRA_ARGS+=("${_cmake_args[@]}")
          fi
          if [ -n "${{ matrix.extra_args }}" ]; then
            read -r -a _matrix_args <<< "${{ matrix.extra_args }}"
            EXTRA_ARGS+=("${_matrix_args[@]}")
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel 1
          ctest --test-dir build --output-on-failure
