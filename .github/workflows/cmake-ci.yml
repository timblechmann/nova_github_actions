name: Reusable C++ CI

on:
  workflow_call:
    inputs:
      exclude_linux:
        description: 'Comma separated list of linux compilers to exclude (e.g. g++-12,clang++-17)'
        required: false
        type: string
        default: ''
      exclude_windows:
        description: 'Comma separated list of windows os_arch to exclude (e.g. windows-2022_x64)'
        required: false
        type: string
        default: ''
      exclude_macos:
        description: 'Comma separated list of macos to exclude (e.g. macos-14)'
        required: false
        type: string
        default: ''
      cxx_standard:
        description: 'C++ language standard to use (e.g. 17, 20, 23)'
        required: false
        type: string
        default: ''

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      linux_matrix: ${{ steps.gen.outputs.linux_matrix }}
      windows_matrix: ${{ steps.gen.outputs.windows_matrix }}
      macos_matrix: ${{ steps.gen.outputs.macos_matrix }}
    steps:
      - name: Generate Matrices
        id: gen
        shell: python
        run: |
          import json
          import os

          exclude_linux = "${{ inputs.exclude_linux }}".split(',')
          exclude_windows = "${{ inputs.exclude_windows }}".split(',')
          exclude_macos = "${{ inputs.exclude_macos }}".split(',')

          linux_base = [
              {"os": "ubuntu-24.04", "compiler": "g++-13", "packages": "g++-13", "build_type": "Debug"},
              {"os": "ubuntu-24.04", "compiler": "g++-14", "packages": "g++-14", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-17", "packages": "clang-17", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-18", "packages": "clang-18", "build_type": "Release"},
              {"os": "ubuntu-24.04", "compiler": "clang++-19", "packages": "clang-19", "build_type": "Debug"},
              {"os": "ubuntu-24.04", "compiler": "clang++-20", "packages": "clang-20", "build_type": "Release"},
              {"os": "ubuntu-22.04", "compiler": "g++-12", "packages": "g++-12", "build_type": "Debug"},
              {"os": "ubuntu-24.04-arm", "compiler": "g++-14", "packages": "g++-14", "build_type": "Debug"}
          ]

          windows_base = [
              {"os": "windows-2025", "arch": "x64", "build_type": "Release"},
              {"os": "windows-2025", "arch": "x86", "build_type": "Release"},
              {"os": "windows-2022", "arch": "x64", "build_type": "Release"}
          ]

          macos_base = [
              {"os": "macos-14", "build_type": "Release"},
              {"os": "macos-15", "build_type": "Release"},
              {"os": "macos-15-intel", "build_type": "Release"}
          ]

          linux_matrix = [x for x in linux_base if x['compiler'] not in exclude_linux]
          windows_matrix = [x for x in windows_base if f"{x['os']}_{x['arch']}" not in exclude_windows]
          macos_matrix = [x for x in macos_base if x['os'] not in exclude_macos]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"linux_matrix={json.dumps({'include': linux_matrix})}\n")
              f.write(f"windows_matrix={json.dumps({'include': windows_matrix})}\n")
              f.write(f"macos_matrix={json.dumps({'include': macos_matrix})}\n")

  build-linux:
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.generate-matrix.outputs.linux_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}

      - name: Configure, build, and test
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  build-windows:
    needs: [generate-matrix, build-linux]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.generate-matrix.outputs.windows_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.arch }}-

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: windows-${{ matrix.arch }}-${{ matrix.build_type }}
          variant: sccache

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      - name: Configure, build, and test
        shell: bash
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  build-macos:
    needs: [generate-matrix, build-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJson(needs.generate-matrix.outputs.macos_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cpm-cache
          key: cpm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.os }}-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: ${{ matrix.os }}-${{ matrix.build_type }}

      - name: Configure, build, and test
        env:
          CPM_SOURCE_CACHE: ${{ runner.temp }}/cpm-cache
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ inputs.cxx_standard }}" ]; then
            EXTRA_ARGS+=("-DCMAKE_CXX_STANDARD=${{ inputs.cxx_standard }}")
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA_ARGS[@]}"
          cmake --build build --parallel 1
          ctest --test-dir build --output-on-failure
